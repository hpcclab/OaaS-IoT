syntax = "proto3";
package oaas.netsim;

service NetsimService {
  // Send a control command (partition/heal/set-latency/get-status) to the
  // local router's netsim subsystem through the CRM.
  rpc Control(NetsimControlRequest) returns (NetsimControlResponse);
}

enum NetsimAction {
  GET_STATUS = 0;
  PARTITION = 1;
  HEAL = 2;
  SET_LATENCY = 3;
}

message NetsimControlRequest {
  NetsimAction action = 1;
  // Target peer environment name (required for PARTITION/HEAL/SET_LATENCY).
  string peer = 2;
  // Latency in milliseconds (used with SET_LATENCY).
  uint64 latency_ms = 3;
}

message PeerLinkInfo {
  string peer_env = 1;
  bool connected = 2;
  uint64 latency_ms = 3;
}

message NetsimControlResponse {
  string env_name = 1;
  repeated PeerLinkInfo links = 2;
}
