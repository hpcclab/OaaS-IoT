---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixel-canvas-frontend
  labels:
    app.kubernetes.io/name: pixel-canvas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pixel-canvas-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pixel-canvas-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/pawissanutt/oaas-rs/pixel-canvas-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: pixel-canvas-frontend
  labels:
    app.kubernetes.io/name: pixel-canvas-frontend
spec:
  selector:
    app.kubernetes.io/name: pixel-canvas-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
