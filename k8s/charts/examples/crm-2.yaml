image:
  repository: ghcr.io/pawissanutt/oaas-rs/crm
  pullPolicy: Always
  tag: "dev-alpha"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

logging:
  level: info,oprc_crm=debug,otel::tracing=trace
  format: plain

router:
  resources:
    # limits:
    #   cpu: "8"
    #   memory: "512Mi"
    requests:
      cpu: "0.25"
      memory: "256Mi"
  logLevel: "info"
  zenoh:
    peers: "tcp/oaas-crm-1-oprc-crm-router.oaas-1.svc.cluster.local:17447"
  image:
    repository: ghcr.io/pawissanutt/oaas-rs/router
    tag: "dev"
    pullPolicy: Always
  networkSim:
    enabled: true
    envName: "oaas-2"
    peers: "oaas-1=oaas-crm-1-oprc-crm-router.oaas-1.svc.cluster.local:17447"
  extraEnv:
    OPRC_ZENOH_ADMINSPACE_ENABLED: "true"


gateway:
  enabled: true
  image:
    repository: ghcr.io/pawissanutt/oaas-rs/gateway
    tag: "dev-alpha"
    pullPolicy: Always
  service:
    type: NodePort
    port: 80
    targetPort: 8080
    nodePort: 30281
  env:
    logLevel: "info,oprc_gateway=debug"
    requestTimeoutMs: 30000
    maxPayloadBytes: 4194304
    retryAttempts: 0
    wsEnabled: true
    zenoh_mode: client

# Scope CRM-2 to namespace oaas-2 and use it for default operations
config:
  namespace: oaas-2
  templates:
    odgmImageOverride: "harbor.129.114.108.87.nip.io/oaas/odgm:dev-alpha"
    odgmPullPolicy: "Always"
  features:
    fsm: true
    knative: true

otel:
  enabled: true
  logsEnabled: true
  endpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"